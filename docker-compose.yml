networks:
  app-net:
    driver: bridge

volumes:
  db-data:

services:
  frontend:
    image: acrmyappdevcentralindia001.azurecr.io/frontend:latest
    ports:
      - "8080:3000"
    restart: always

  backend:
   
    image: ${ACR_NAME}.azurecr.io/backend:latest
    ports:
      - "3000:3000"
    depends_on:
      - database
    networks:
      - app-net
    restart: unless-stopped
    environment:
      - MONGODB_URI=${MONGODB_URI}

  database:
    image: mongo:latest
    volumes:
      - mongo-data:/data/db
    networks:
      - app-net
    restart: unless-stopped
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${DB_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${DB_PASSWORD}

  volumes:
    mongo-data: