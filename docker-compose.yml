version: '3.8'

networks:
  app-net:
    driver: bridge

services:
  frontend:
    image: ${ACR_NAME}.azurecr.io/frontend:latest
    ports:
      - "8080:3000"  # Next.js runs on 3000, mapped to 8080 for the browser
    depends_on:
      - backend
    networks:
      - app-net
    restart: unless-stopped

  backend:
    image: ${ACR_NAME}.azurecr.io/backend:latest
    ports:
      - "3000:3000"
    networks:
      - app-net
    restart: unless-stopped
    environment:
      - MONGODB_URI=${MONGODB_URI}

# Note: The 'database' service and 'volumes' are removed because your data is now in MongoDB Atlas.