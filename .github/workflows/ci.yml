name: CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Images
        run: |
          docker build -t my-backend:latest ./backend
          docker build -t my-frontend:latest ./frontend

      - name: Scan Backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'my-backend:latest'
          format: 'table'
          exit-code: '0' 
          severity: 'CRITICAL,HIGH'

      - name: Scan Frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'my-frontend:latest'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'