name: CD - Deploy to Azure

on:
  push:
    branches: [ main ]
  # This allows the Sub-Repos to trigger this workflow
  repository_dispatch:
    types: [sub_repo_update]
  workflow_dispatch: # Still allows manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Set image tag
        run: echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV

      - name: Deploy to Azure VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSHKEY }}
          script: |
            cd ~/my-3tier-app

            # ✅ Pull latest config (docker-compose.yml, etc.)
            git pull origin main

            # Login to ACR
            echo "${{ secrets.ACR_PASSWORD }}" | docker login ${{ secrets.ACR_NAME }}.azurecr.io \
              -u ${{ secrets.ACR_USERNAME }} --password-stdin

            # Pull BOTH images
            docker pull ${{ secrets.ACR_NAME }}.azurecr.io/frontend:${{ github.sha }}
            docker pull ${{ secrets.ACR_NAME }}.azurecr.io/backend:${{ github.sha }}

            # Export variables for docker-compose
            export IMAGE_TAG=${{ github.sha }}
            export ACR_NAME=${{ secrets.ACR_NAME }}
            export MONGODB_URI="${{ secrets.MONGODB_URI }}"

            # Deploy (no build)
            docker compose up -d --remove-orphans

            # Cleanup
            docker image prune -f

      - name: Notify Discord on Success
        if: success()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ job.status }}
          content: "🚀 Deployment Successful! Version: ${{ github.sha }}"
          title: "CD Pipeline Result"
          color: 0x00ff00

      - name: Notify Discord on Failure
        if: failure()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ job.status }}
          content: "⚠️ Deployment Failed! Check logs."
          title: "CD Pipeline Result"
          color: 0xff0000