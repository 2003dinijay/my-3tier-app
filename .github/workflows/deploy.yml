name: CD - Deploy to Azure

on:
  workflow_run:
    workflows: ["CI Pipeline"] # Only runs if your CI (Scans/Builds) succeeds
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Deploying to Azure VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSHKEY }}
          script: |
            # 1. Create app directory
            mkdir -p ~/my-3tier-app
            cd ~/my-3tier-app

            # 2. Clone or Update code
            if [ ! -d ".git" ]; then
              git clone https://github.com/${{ github.repository }} .
            else
              git pull origin main
            fi

            # 3. Deploy/Restart the containers (Step 7 & 11)
            # This uses the --build flag to ensure fresh images are used
            docker compose up -d --build

            # 4. Clean up old, unused images to save VM space (Step 3)
            docker image prune -f